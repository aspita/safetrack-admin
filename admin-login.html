<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeTrack — Admin Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #1b4332; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .box { background: white; padding: 40px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    .logo { text-align: center; margin-bottom: 24px; }
    .logo h1 { color: #2d6a4f; font-size: 28px; }
    .logo p { color: #777; font-size: 14px; margin-top: 4px; }
    .admin-badge { background: #1b4332; color: white; font-size: 11px; padding: 3px 10px; border-radius: 12px; display: inline-block; margin-top: 6px; }
    label { display: block; margin-top: 16px; font-weight: bold; font-size: 14px; color: #333; }
    input { width: 100%; padding: 12px; margin-top: 6px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
    button { margin-top: 24px; width: 100%; padding: 14px; background: #1b4332; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
    button:hover { background: #2d6a4f; }
    #message { margin-top: 16px; padding: 12px; border-radius: 6px; font-size: 14px; display: none; text-align: center; background: #ffe5e5; color: #9b2226; }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">
      <h1>🛡️ SafeTrack</h1>
      <p>Super Admin Portal</p>
      <span class="admin-badge">ADMIN ACCESS ONLY</span>
    </div>

    <label>Admin Username</label>
    <input type="text" id="username" placeholder="Enter admin username">

    <label>Admin Password</label>
    <input type="password" id="password" placeholder="Enter admin password">

    <button onclick="login()">Login to Admin Panel</button>

    <div id="message"></div>
  </div>

  <script>
    const ADMIN_USERNAME = 'aspita_admin';
    const ADMIN_PASSWORD = 'SafeTrack2026!';

    function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!username || !password) {
        showMessage('Please fill in all fields.');
        return;
      }

      if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
        localStorage.setItem('admin_logged_in', 'true');
        window.location.href = 'admin-dashboard.html';
      } else {
        showMessage('Invalid username or password.');
      }
    }

    function showMessage(text) {
      const msg = document.getElementById('message');
      msg.textContent = text;
      msg.style.display = 'block';
    }
  </script>
</body>
</html>
