<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeTrack — School Login</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2d6a4f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="SafeTrack">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .box { background: white; padding: 40px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
    .logo { text-align: center; margin-bottom: 24px; }
    .logo h1 { color: #2d6a4f; font-size: 28px; }
    .logo p { color: #777; font-size: 14px; margin-top: 4px; }
    label { display: block; margin-top: 16px; font-weight: bold; font-size: 14px; color: #333; }
    input { width: 100%; padding: 12px; margin-top: 6px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
    button { margin-top: 24px; width: 100%; padding: 14px; background: #2d6a4f; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
    button:hover { background: #1b4332; }
    #message { margin-top: 16px; padding: 12px; border-radius: 6px; font-size: 14px; display: none; text-align: center; }
    .error { background: #ffe5e5; color: #9b2226; }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">
      <h1>🛡️ SafeTrack</h1>
      <p>School Portal Login</p>
    </div>

    <label>Username</label>
    <input type="text" id="username" placeholder="Enter your school username">

    <label>Password</label>
    <input type="password" id="password" placeholder="Enter your password">

    <button onclick="login()">Login</button>

    <div id="message"></div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const URL = 'https://nasixrwwzkzclwdcbaip.supabase.co';
    const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hc2l4cnd3emt6Y2x3ZGNiYWlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MTk1NDEsImV4cCI6MjA5NjA5NTU0MX0.4h2VWGMOPlBxcrATqAqPQK7yrhMQf26n8UIOET_aJeo';
    const db = createClient(URL, KEY);

    window.login = async function() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!username || !password) {
        showMessage('Please fill in all fields.');
        return;
      }

      const { data, error } = await db
        .from('schools')
        .select('*')
        .eq('username', username)
        .eq('password', password)
        .single();

      if (error || !data) {
        showMessage('Invalid username or password. Please try again.');
        return;
      }

      localStorage.setItem('school_id', data.id);
      localStorage.setItem('school_name', data.school_name);
      window.location.href = 'school-dashboard.html';
    }

    function showMessage(text) {
      const msg = document.getElementById('message');
      msg.textContent = text;
      msg.className = 'error';
      msg.style.display = 'block';
    }
  </script>
</body>
</html>
