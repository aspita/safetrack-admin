<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeTrack — Gate</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; }
    .header { background: #2d6a4f; color: white; padding: 16px 20px; text-align: center; }
    .header h1 { font-size: 20px; }
    .header p { font-size: 13px; opacity: 0.8; margin-top: 4px; }
    .voice-banner { background: #f4a261; padding: 12px; text-align: center; font-size: 14px; font-weight: bold; color: white; cursor: pointer; }
    .tabs { display: flex; background: #1b4332; }
    .tab { flex: 1; padding: 14px; text-align: center; color: white; cursor: pointer; font-size: 15px; opacity: 0.6; border: none; background: none; }
    .tab.active { opacity: 1; border-bottom: 3px solid white; font-weight: bold; }
    .page { display: none; padding: 20px; max-width: 500px; margin: 0 auto; }
    .page.active { display: block; }
    .mode-buttons { display: flex; gap: 10px; margin-bottom: 16px; }
    .mode-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; color: white; font-weight: bold; }
    .mode-btn.arrival { background: #2d6a4f; }
    .mode-btn.departure { background: #e63946; }
    .mode-btn.active { outline: 3px solid #333; }
    #mode-label { text-align: center; font-size: 14px; color: #555; margin-bottom: 12px; font-weight: bold; }
    #reader { width: 100%; border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
    #scan-result { padding: 16px; border-radius: 10px; font-size: 15px; text-align: center; display: none; font-weight: bold; }
    .pin-box { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .pin-box h2 { font-size: 18px; color: #2d6a4f; margin-bottom: 8px; }
    .pin-box p { font-size: 13px; color: #777; margin-bottom: 20px; }
    .pin-input { width: 100%; padding: 16px; border: 2px solid #ccc; border-radius: 10px; font-size: 28px; text-align: center; letter-spacing: 10px; box-sizing: border-box; margin-bottom: 16px; }
    .pin-input:focus { border-color: #2d6a4f; outline: none; }
    .verify-btn { width: 100%; padding: 14px; background: #2d6a4f; color: white; border: none; border-radius: 10px; font-size: 17px; font-weight: bold; cursor: pointer; }
    .verify-btn:hover { background: #1b4332; }
    #pin-result { margin-top: 16px; padding: 20px; border-radius: 12px; text-align: center; display: none; }
    #pin-result .result-icon { font-size: 48px; margin-bottom: 8px; }
    #pin-result .result-name { font-size: 22px; font-weight: bold; margin-bottom: 6px; }
    #pin-result .result-msg { font-size: 14px; }
    .success { background: #d8f3dc; color: #1b4332; }
    .error { background: #ffe5e5; color: #9b2226; }
  </style>
</head>
<body>

  <div class="header">
    <h1>🛡️ SafeTrack Gate</h1>
    <p>School gate management system</p>
  </div>

  <div class="voice-banner" id="voice-banner" onclick="activateVoice()">
    🔊 Tap here to activate voice
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-scanner" onclick="switchTab('scanner')">📷 QR Scanner</button>
    <button class="tab" id="tab-pin" onclick="switchTab('pin')">🔐 Verify PIN</button>
  </div>

  <div class="page active" id="page-scanner">
    <br>
    <div class="mode-buttons">
      <button class="mode-btn arrival active" id="btn-arrival" onclick="setMode('arrival')">✅ Arrival</button>
      <button class="mode-btn departure" id="btn-departure" onclick="setMode('departure')">🚪 Departure</button>
    </div>
    <div id="mode-label">Mode: Arrival</div>
    <div id="reader"></div>
    <div id="scan-result"></div>
  </div>

  <div class="page" id="page-pin">
    <br>
    <div class="pin-box">
      <h2>Verify Pickup PIN</h2>
      <p>Enter the 6-digit PIN given by the parent</p>
      <input type="number" class="pin-input" id="pin-input" placeholder="000000">
      <button class="verify-btn" id="verify-btn">Verify PIN</button>
      <div id="pin-result"></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const SUPABASE_URL = 'https://nasixrwwzkzclwdcbaip.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hc2l4cnd3emt6Y2x3ZGNiYWlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MTk1NDEsImV4cCI6MjA5NjA5NTU0MX0.4h2VWGMOPlBxcrATqAqPQK7yrhMQf26n8UIOET_aJeo';
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentMode = 'arrival';
    let scanning = true;
    let scannerStarted = false;
    let voiceReady = false;

    // Activate voice on tap
  window.activateVoice = function() {
  window.speechSynthesis.cancel();
  const test = new SpeechSynthesisUtterance('Yay! SafeTrack is ready! Have a wonderful day!');
  test.lang = 'en-GB';
  test.pitch = 1.8;
  test.rate = 1.1;
  test.volume = 1;
  window.speechSynthesis.speak(test);
  voiceReady = true;
  document.getElementById('voice-banner').style.display = 'none';
}

function speak(message) {
  try {
    if (!voiceReady) return;
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(message);
    utterance.lang = 'en-GB';
    utterance.rate = 1.1;
    utterance.pitch = 1.8;
    utterance.volume = 1;
    window.speechSynthesis.speak(utterance);
  } catch(e) {}
}

    // Tab switching
    window.switchTab = function(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      document.getElementById('page-' + tab).classList.add('active');
      if (tab === 'scanner' && !scannerStarted) {
        startScanner();
      }
    }

    // Mode switching
    window.setMode = function(mode) {
      currentMode = mode;
      document.getElementById('mode-label').textContent = 'Mode: ' + (mode === 'arrival' ? 'Arrival' : 'Departure');
      document.getElementById('btn-arrival').classList.toggle('active', mode === 'arrival');
      document.getElementById('btn-departure').classList.toggle('active', mode === 'departure');
    }

    // Beep sound
    function beep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = ctx.createOscillator();
        const gain = ctx.createGain();
        oscillator.connect(gain);
        gain.connect(ctx.destination);
        oscillator.type = 'sine';
        oscillator.frequency.value = 1200;
        gain.gain.setValueAtTime(1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
        oscillator.start(ctx.currentTime);
        oscillator.stop(ctx.currentTime + 0.3);
      } catch(e) {}
    }

    // Show scan result
    function showScanResult(text, type) {
      const el = document.getElementById('scan-result');
      el.textContent = text;
      el.className = type;
      el.style.display = 'block';
      setTimeout(() => {
        el.style.display = 'none';
        scanning = true;
      }, 4000);
    }

    // Handle QR scan
    async function onScan(qrCode) {
      if (!scanning) return;
      scanning = false;

      const { data, error } = await db
        .from('students')
        .select('*')
        .eq('qr_code', qrCode)
        .single();

      if (error || !data) {
        beep();
        showScanResult('Student not found! Check the ID card.', 'error');
        return;
      }

      // Get last attendance record
      const { data: lastLog } = await db
        .from('attendance_logs')
        .select('*')
        .eq('student_id', data.id)
        .order('scanned_at', { ascending: false })
        .limit(1)
        .single();

      const lastScan = lastLog ? lastLog.scan_type : null;

      // Block double arrival
      if (currentMode === 'arrival' && lastScan === 'arrival') {
        beep();
        showScanResult('⚠️ ' + data.full_name + ' already arrived! They must depart first.', 'error');
        return;
      }

      // Block departure without arrival
      if (currentMode === 'departure' && (lastScan === null || lastScan === 'departure')) {
        beep();
        showScanResult('⚠️ ' + data.full_name + ' has not arrived yet! Arrival must come first.', 'error');
        return;
      }

      // Log the attendance
      const { error: logError } = await db.from('attendance_logs').insert([{
        student_id: data.id,
        scan_type: currentMode,
        scanned_at: new Date().toISOString()
      }]);

      if (logError) {
        showScanResult('Error logging: ' + logError.message, 'error');
      } else {
        beep();
        const time = new Date().toLocaleTimeString('en-NG', {
          hour: '2-digit', minute: '2-digit', hour12: true
        });
       if (currentMode === 'arrival') {
  const welcomes = [
    'Yay! Welcome to school ' + data.full_name + '! Ready to learn today?',
    'Hello ' + data.full_name + '! So happy to see you! Have a super day!',
    'Good morning ' + data.full_name + '! You made it! Let the learning begin!',
    'Welcome welcome welcome ' + data.full_name + '! Today is going to be amazing!'
  ];
  speak(welcomes[Math.floor(Math.random() * welcomes.length)]);
  showScanResult('✅ ' + data.full_name + ' arrived at ' + time, 'success');
} else {
  const goodbyes = [
    'Bye bye ' + data.full_name + '! You were amazing today! See you tomorrow!',
    'Goodbye ' + data.full_name + '! Go home and rest! You did great today!',
    'See you tomorrow ' + data.full_name + '! Have a safe and lovely journey home!',
    'Bye bye ' + data.full_name + '! Don\'t forget to do your homework! See you soon!'
  ];
  speak(goodbyes[Math.floor(Math.random() * goodbyes.length)]);
  showScanResult('🚪 ' + data.full_name + ' departed at ' + time, 'success');
}
      }
    }

    // Start scanner
    function startScanner() {
      const scanner = new Html5Qrcode('reader');
      scanner.start(
        { facingMode: 'environment' },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        onScan,
        () => {}
      );
      scannerStarted = true;
    }

    // PIN verification
    document.getElementById('verify-btn').addEventListener('click', async function() {
      const pin = document.getElementById('pin-input').value.trim();

      if (!pin || pin.length !== 6) {
        alert('Please enter a valid 6-digit PIN.');
        return;
      }

      const { data, error } = await db
        .from('pickup_pins')
        .select('*, students(*)')
        .eq('pin_code', pin)
        .eq('used', false)
        .single();

      const resultEl = document.getElementById('pin-result');

      if (error || !data) {
        resultEl.innerHTML = `
          <div class="result-icon">❌</div>
          <div class="result-name">Invalid PIN</div>
          <div class="result-msg">This PIN does not exist or has already been used.</div>`;
        resultEl.className = 'error';
        resultEl.style.display = 'block';
        return;
      }

      const now = new Date();
      const expires = new Date(data.expires_at);

      if (now > expires) {
        resultEl.innerHTML = `
          <div class="result-icon">⏰</div>
          <div class="result-name">${data.students.full_name}</div>
          <div class="result-msg">PIN has expired! Ask the parent to generate a new one.</div>`;
        resultEl.className = 'error';
        resultEl.style.display = 'block';
        return;
      }

      await db.from('pickup_pins').update({ used: true }).eq('id', data.id);

      speak('Access granted. Please release ' + data.students.full_name + ' to ' + data.pickup_name);

      resultEl.innerHTML = `
        <div class="result-icon">✅</div>
        <div class="result-name">${data.students.full_name}</div>
        <div class="result-msg">Access granted! Release <strong>${data.students.full_name}</strong> to <strong>${data.pickup_name}</strong>.</div>`;
      resultEl.className = 'success';
      resultEl.style.display = 'block';

      document.getElementById('pin-input').value = '';
    });

    // Start scanner on load
    startScanner();
  </script>
</body>
</html>
